    var m=Math.floor(timeLeft/60),s=timeLeft%60;
    ge('timer-display').textContent=(m<10?'0':'')+m+':'+(s<10?'0':'')+s;
    ge('timer-display').className=timeLeft<=300?'warning':'';
    if(timeLeft<=0){clearInterval(timerInt);alert('时间到，自动提交！');doSubmit();}
  },1000);
  window.scrollTo(0,0);
}

function renderQuiz(){
  var c=ge('quiz-content'); c.innerHTML='';
  // Section 1
  c.appendChild(mkSec('第一部分','单项选择题','每题2分，共20分'));
  for(var i=0;i<QS.single.length;i++){(function(i){
    var q=QS.single[i], card=mkCard('sc'+i);
    card.appendChild(mkQT(i+1,q.q,''));
    var od=document.createElement('div'); od.className='options';
    for(var j=0;j<q.opts.length;j++){(function(j){
      var opt=q.opts[j], key=opt.charAt(0);
      var lbl=document.createElement('label'); lbl.className='option-label'; lbl.id='sl'+i+key;
      var inp=document.createElement('input'); inp.type='radio'; inp.name='sq'+i; inp.value=key;
      inp.addEventListener('change',function(){selS(i,key);});
      var sk=document.createElement('span'); sk.className='option-key'; sk.textContent=key;
      var st=document.createElement('span'); st.textContent=' '+opt.slice(3);
      lbl.appendChild(inp); lbl.appendChild(sk); lbl.appendChild(st);
      od.appendChild(lbl);
    })(j);}
    card.appendChild(od); c.appendChild(card);
  })(i);}

  // Section 2
  c.appendChild(mkSec('第二部分','多项选择题','每题3分，共30分，多选少选错选均不得分'));
  for(var i=0;i<QS.multi.length;i++){(function(i){
    var q=QS.multi[i], card=mkCard('mc'+i);
    card.appendChild(mkQT(i+1,q.q,''));
    var od=document.createElement('div'); od.className='options';
    for(var j=0;j<q.opts.length;j++){(function(j){
      var opt=q.opts[j], key=opt.charAt(0);
      var lbl=document.createElement('label'); lbl.className='option-label'; lbl.id='ml'+i+key;
      var inp=document.createElement('input'); inp.type='checkbox'; inp.name='mq'+i; inp.value=key;
      inp.addEventListener('change',function(){selM(i,key,inp.checked);});
      var sk=document.createElement('span'); sk.className='option-key'; sk.textContent=key;
      var st=document.createElement('span'); st.textContent=' '+opt.slice(3);
      lbl.appendChild(inp); lbl.appendChild(sk); lbl.appendChild(st);
      od.appendChild(lbl);
    })(j);}
    card.appendChild(od); c.appendChild(card);
  })(i);}

  // Section 3
  c.appendChild(mkSec('第三部分','判断题','每题2分，共20分'));
  for(var i=0;i<QS.judgment.length;i++){(function(i){
    var q=QS.judgment[i], card=mkCard('jc'+i);
    card.appendChild(mkQT(i+1,q.q,''));
    var row=document.createElement('div'); row.className='judgment-options';
    var tb=document.createElement('button'); tb.className='judgment-btn'; tb.id='jt'+i; tb.textContent='✓ 正确（√）';
    tb.addEventListener('click',function(){selJ(i,true);});
    var fb=document.createElement('button'); fb.className='judgment-btn'; fb.id='jf'+i; fb.textContent='✗ 错误（×）';
    fb.addEventListener('click',function(){selJ(i,false);});
    row.appendChild(tb); row.appendChild(fb); card.appendChild(row); c.appendChild(card);
  })(i);}

  // Section 4
  c.appendChild(mkSec('第四部分','简答题','每题15分，共30分'));
  for(var i=0;i<QS.essay.length;i++){(function(i){
    var q=QS.essay[i], card=mkCard('ec'+i);
    card.appendChild(mkQT(i+1,q.q,'（'+q.score+'分）'));
    var ta=document.createElement('textarea'); ta.className='essay-area'; ta.id='ea'+i; ta.placeholder='请在此输入您的答案（建议200字以上）...';
    ta.addEventListener('input',function(){UA.essay[i]=ta.value; ge('ec'+i).classList.toggle('answered',ta.value.trim().length>0); updProg();});
    var hint=document.createElement('div'); hint.className='essay-hint'; hint.textContent='💡 请结合实际，言之有据，条理清晰';
    card.appendChild(ta); card.appendChild(hint); c.appendChild(card);
  })(i);}
  updProg();
}

function mkSec(num,title,note){
  var d=document.createElement('div'); d.className='section-header';
  var n=document.createElement('div'); n.className='section-number'; n.textContent=num;
  var t=document.createElement('div'); t.className='section-title'; t.textContent=title;
  var no=document.createElement('div'); no.className='section-note'; no.textContent=note;
  d.appendChild(n); d.appendChild(t); d.appendChild(no); return d;
}
function mkCard(id){var d=document.createElement('div'); d.className='question-card'; d.id=id; return d;}
function mkQT(n,q,score){
  var d=document.createElement('div'); d.className='question-text';
  d.innerHTML='<span class="q-num">'+n+'.</span>'+q+(score?'<span class="q-score">'+score+'</span>':'');
  return d;
}

function selS(i,key){
  UA.single[i]=key;
  for(var j=0;j<QS.single[i].opts.length;j++){
    var k=QS.single[i].opts[j].charAt(0);
    var el=ge('sl'+i+k); if(el) el.classList.toggle('selected',k===key);
  }
  ge('sc'+i).classList.add('answered'); updProg();
}
function selM(i,key,checked){
  var arr=UA.multi[i];
  if(checked){if(arr.indexOf(key)===-1)arr.push(key);}
  else{var x=arr.indexOf(key);if(x>-1)arr.splice(x,1);}
  var el=ge('ml'+i+key); if(el) el.classList.toggle('selected',checked);
  ge('mc'+i).classList.toggle('answered',arr.length>0); updProg();
}
function selJ(i,val){
  UA.judgment[i]=val;
  ge('jt'+i).className=val===true?'judgment-btn sel-true':'judgment-btn';
  ge('jf'+i).className=val===false?'judgment-btn sel-false':'judgment-btn';
  ge('jc'+i).classList.add('answered'); updProg();
}

function countDone(){
  var d=0;
  for(var i=0;i<10;i++){if(UA.single[i]!==null)d++;}
  for(var i=0;i<10;i++){if(UA.multi[i].length>0)d++;}
  for(var i=0;i<10;i++){if(UA.judgment[i]!==null)d++;}
  for(var i=0;i<2;i++){if(UA.essay[i].trim().length>0)d++;}
  return d;
}
function updProg(){
  var done=countDone(), pct=Math.round(done/32*100);
  ge('progress-bar-fill').style.width=pct+'%';
  ge('progress-text').textContent='答题进度 '+pct+'% ('+done+'/32)';
}

function confirmSub(){
  var left=32-countDone();
  ge('modal-msg').innerHTML=left>0?'您还有 <strong>'+left+'</strong> 道题目未作答，确认提交吗？':'所有题目已作答，确认提交试卷吗？';
  ge('modal').classList.add('active');
}
function closeModal(){ge('modal').classList.remove('active');}
function doSubmit(){
  if(submitted)return; submitted=true;
  clearInterval(timerInt); closeModal();
  var elapsed=Math.floor((new Date()-uInfo.t0)/1000);
  var mins=Math.floor(elapsed/60), secs=elapsed%60;

  // 整理答题数据
  var singleResult=[], multiResult=[], judgmentResult=[];
  for(var i=0;i<10;i++){
    var ok=UA.single[i]===QS.single[i].ans;
    singleResult.push('第'+(i+1)+'题：您选'+( UA.single[i]||'未答')+' / 正确答案:'+QS.single[i].ans+' ['+(ok?'✓':'✗')+']');
  }
  for(var i=0;i<10;i++){
    var u=[].concat(UA.multi[i]).sort(), ok=JSON.stringify(u)===JSON.stringify([].concat(QS.multi[i].ans).sort());
    multiResult.push('第'+(i+1)+'题：您选'+(u.join('')||'未答')+' / 正确答案:'+QS.multi[i].ans.join('')+' ['+(ok?'✓':'✗')+']');
  }
  for(var i=0;i<10;i++){
    var ok=UA.judgment[i]===QS.judgment[i].ans;
    var uStr=UA.judgment[i]===null?'未答':UA.judgment[i]?'正确':'错误';
    var aStr=QS.judgment[i].ans?'正确':'错误';
    judgmentResult.push('第'+(i+1)+'题：您答'+uStr+' / 正确答案:'+aStr+' ['+(ok?'✓':'✗')+']');
  }

  // 计算客观题分数
  var score=0;
  for(var i=0;i<10;i++){if(UA.single[i]===QS.single[i].ans)score+=2;}
  for(var i=0;i<10;i++){var u=[].concat(UA.multi[i]).sort();if(JSON.stringify(u)===JSON.stringify([].concat(QS.multi[i].ans).sort()))score+=3;}
  for(var i=0;i<10;i++){if(UA.judgment[i]===QS.judgment[i].ans)score+=2;}

  var grade=score>=56?'优秀':score>=49?'良好':score>=42?'及格':'不及格';

  // 提交到 Formspree
  var formData = new FormData();
  formData.append('姓名', uInfo.name);
  formData.append('单位及职务', uInfo.unit);
  formData.append('客观题得分', score + ' / 70分');
  formData.append('成绩等级', grade);
  formData.append('考试用时', mins+'分'+( secs<10?'0':'')+secs+'秒');
  formData.append('提交时间', new Date().toLocaleString('zh-CN'));
  formData.append('单项选择题答题详情', singleResult.join('\n'));
  formData.append('多项选择题答题详情', multiResult.join('\n'));
  formData.append('判断题答题详情', judgmentResult.join('\n'));
  formData.append('简答题第1题', UA.essay[0].trim()||'（未作答）');
  formData.append('简答题第2题', UA.essay[1].trim()||'（未作答）');

  fetch('https://formspree.io/f/mojbyrqk', {
    method: 'POST',
    body: formData,
    headers: { 'Accept': 'application/json' }
  }).then(function(res){
    if(!res.ok) console.warn('提交失败，状态码：'+res.status);
  }).catch(function(err){
    console.warn('网络提交失败：', err);
  });

  showResult(mins, secs);
}

function showResult(mins,secs){
  ge('progress-wrap').style.display='none';
  ge('quiz-screen').style.display='none';
  var rs=ge('result-screen'); rs.style.display='block';
  window.scrollTo(0,0);
  var score=0, sd=[], md=[], jd=[];
  for(var i=0;i<10;i++){var ok=UA.single[i]===QS.single[i].ans;if(ok)score+=2;sd.push({ok:ok,u:UA.single[i]||'未答',a:QS.single[i].ans});}
  for(var i=0;i<10;i++){var u=[].concat(UA.multi[i]).sort(),ok=JSON.stringify(u)===JSON.stringify([].concat(QS.multi[i].ans).sort());if(ok)score+=3;md.push({ok:ok,u:u.join('')||'未答',a:QS.multi[i].ans.join('')});}
  for(var i=0;i<10;i++){var ok=UA.judgment[i]===QS.judgment[i].ans;if(ok)score+=2;jd.push({ok:ok,u:UA.judgment[i]===null?'未答':UA.judgment[i]?'√正确':'×错误',a:QS.judgment[i].ans?'√正确':'×错误'});}
  var cor=0,wr=0; for(var i=0;i<sd.length;i++){if(sd[i].ok)cor++;else wr++;} for(var i=0;i<md.length;i++){if(md[i].ok)cor++;else wr++;} for(var i=0;i<jd.length;i++){if(jd[i].ok)cor++;else wr++;}
  var ef=UA.essay.filter(function(e){return e.trim().length>0;}).length;
  var grade=score>=56?'优秀':score>=49?'良好':score>=42?'及格':'不及格';
  var emoji=score>=56?'🏆':score>=49?'🌟':score>=42?'✅':'📚';

  var rv='<p class="review-section-title">📝 单项选择题</p>';
  for(var i=0;i<sd.length;i++)rv+='<div class="review-item '+(sd[i].ok?'correct':'wrong')+'"><span>'+(sd[i].ok?'✓':'✗')+'</span><span>第'+(i+1)+'题 — 您选：<b>'+sd[i].u+'</b>，正确答案：<b>'+sd[i].a+'</b></span></div>';
  rv+='<p class="review-section-title">📝 多项选择题</p>';
  for(var i=0;i<md.length;i++)rv+='<div class="review-item '+(md[i].ok?'correct':'wrong')+'"><span>'+(md[i].ok?'✓':'✗')+'</span><span>第'+(i+1)+'题 — 您选：<b>'+md[i].u+'</b>，正确答案：<b>'+md[i].a+'</b></span></div>';
  rv+='<p class="review-section-title">📝 判断题</p>';
  for(var i=0;i<jd.length;i++)rv+='<div class="review-item '+(jd[i].ok?'correct':'wrong')+'"><span>'+(jd[i].ok?'✓':'✗')+'</span><span>第'+(i+1)+'题 — 您答：<b>'+jd[i].u+'</b>，正确答案：<b>'+jd[i].a+'</b></span></div>';
  rv+='<p class="review-section-title">📝 简答题（人工评分）</p>';
  for(var i=0;i<2;i++)rv+='<div class="review-item essay-r"><span>📄</span><span>第'+(i+1)+'题 — '+(UA.essay[i].trim()?'已作答（'+UA.essay[i].length+'字）':'未作答')+' — 等待人工评分</span></div>';

  rs.innerHTML=
    '<div class="result-card">'+
    '<div class="result-header"><div class="result-icon">'+emoji+'</div>'+
    '<div class="result-name">'+uInfo.name+' · '+uInfo.unit+'</div>'+
    '<div style="font-size:13px;opacity:0.8;margin-top:4px;">客观题得分（简答题等待人工评分）</div>'+
    '<div class="result-score-box"><div class="result-score-num">'+score+'</div><div class="result-score-label">/ 70分（客观题满分）</div></div>'+
    '<div class="result-grade">'+grade+'</div></div>'+
    '<div class="result-stats">'+
    '<div class="stat-item"><div class="stat-num green">'+cor+'</div><div class="stat-label">答对题数</div></div>'+
    '<div class="stat-item"><div class="stat-num red-c">'+wr+'</div><div class="stat-label">答错/未答</div></div>'+
    '<div class="stat-item"><div class="stat-num gold">'+ef+'</div><div class="stat-label">简答已答</div></div>'+
    '</div>'+
    '<div class="result-body">'+
    '<div class="result-info-row">'+
    '<span>姓名：</span><strong>'+uInfo.name+'</strong> &nbsp; '+
    '<span>单位：</span><strong>'+uInfo.unit+'</strong> &nbsp; '+
    '<span>用时：</span><strong>'+mins+'分'+(secs<10?'0':'')+secs+'秒</strong>'+
    '</div>'+
    '<div class="answer-review"><h3>📊 答题详情</h3>'+rv+'</div>'+
    '<button id="btn-retest">↺ 重新答题</button>'+
    '</div></div>';
  ge('btn-retest').addEventListener('click',resetQuiz);
}

function resetQuiz(){
  UA={single:(function(){var a=[];for(var i=0;i<10;i++)a.push(null);return a;})(),multi:(function(){var a=[];for(var i=0;i<10;i++)a.push([]);return a;})(),judgment:(function(){var a=[];for(var i=0;i<10;i++)a.push(null);return a;})(),essay:["",""]};
  timeLeft=3600; submitted=false;
  ge('result-screen').style.display='none';
  ge('progress-wrap').style.display='none';
  ge('info-screen').style.display='block';
  ge('input-name').value=''; ge('input-unit').value='';
  window.scrollTo(0,0);
}

// Bind all buttons — runs immediately, no DOMContentLoaded needed (script is at bottom)
ge('btn-start').addEventListener('click', startQuiz);
ge('btn-submit').addEventListener('click', confirmSub);
ge('btn-cancel').addEventListener('click', closeModal);
ge('btn-confirm').addEventListener('click', doSubmit);
</script>
</body>
